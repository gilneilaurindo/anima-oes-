<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GC Animado V7 - Layout Exato Pânico</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brisa: {
                            orange: '#FF7E05',
                            blue: '#2242D4',
                            black: '#0a0a0a'
                        }
                    },
                    fontFamily: {
                        sans: ['Figtree', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            /* Fundo verde para Chroma Key */
            background-color: #00FF00; 
            font-family: 'Figtree', sans-serif;
        }

        /* Contentor 16:9 */
        .viewport-16-9 {
            position: relative;
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.77vh;
            margin: auto;
            overflow: hidden;
        }

        /* Animação do Letreiro */
        .ticker-wrapper {
            flex: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
            height: 100%;
        }

        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            animation: tickerScroll 35s linear infinite;
            will-change: transform;
        }

        @keyframes tickerScroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .paused { animation-play-state: paused; }

        /* Animações de entrada */
        .anim-slide-in {
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(60px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Zonas de clique para navegação invisível */
        .click-zone { position: absolute; top: 0; height: 100%; z-index: 50; cursor: pointer; }
        .zone-left { left: 0; width: 25%; }
        .zone-center { left: 25%; width: 50%; }
        .zone-right { right: 0; width: 25%; }
    </style>
</head>
<body>

    <div class="viewport-16-9" id="main-container">
        
        <!-- BLOCO ÚNICO DO GC (A Grelha Perfeita do Pânico) -->
        <!-- Encostado abaixo com uma ligeira margem -->
        <div id="gc-content" class="absolute bottom-[4%] left-0 right-0 mx-auto w-[94%] max-w-[1700px] flex flex-col z-10 shadow-[25px_25px_40px_rgba(0,0,0,0.6)] anim-slide-in">
            
            <!-- ================= LINHA 1: LABELS SUPERIORES ================= -->
            <div class="flex h-[42px] w-full">
                <!-- Label Esquerda (O "AO VIVO" - Cor Laranja Unibrisa) -->
                <!-- A largura w-[320px] define a coluna esquerda inteira -->
                <div class="w-[320px] bg-brisa-orange text-white font-black text-[1.6rem] flex items-center justify-center tracking-[0.15em] uppercase shrink-0">
                    AO VIVO
                </div>
                <!-- Label Direita (O nome do programa - Cor Azul Unibrisa) -->
                <!-- As aspas ("") dão o toque idêntico ao "ENTREVISTA EM PÂNICO" -->
                <div id="moment-label" class="flex-1 bg-brisa-blue text-white font-bold text-[1.6rem] flex items-center px-6 tracking-widest uppercase">
                    "BRISACAST - ABERTURA"
                </div>
            </div>

            <!-- ================= LINHA 2: CAIXA PRINCIPAL BRANCA ================= -->
            <div class="flex h-[145px] w-full bg-white">
                
                <!-- Coluna Esquerda: Caixa da Logo Unibrisa -->
                <!-- Mantém os exatos w-[320px] e uma borda direita preta grossa para dividir -->
                <div class="w-[320px] bg-white border-r-[8px] border-brisa-black flex flex-col justify-center items-center shrink-0 z-10">
                    <img src="https://raw.githubusercontent.com/gilneilaurindo/Positiva-o-Unibrisa/main/logo%20Unibrisa.png" 
                         alt="Unibrisa" class="h-[75px] object-contain">
                </div>

                <!-- Coluna Direita: Textos Principais Gigantes -->
                <div class="flex-1 py-1 px-8 flex flex-col justify-center overflow-hidden z-10">
                    
                    <!-- Título Azul Gigante (Equivalente ao INSTAGRAM: @RONALDOCAIADO) -->
                    <h1 id="main-title" class="text-[4rem] font-black text-brisa-blue uppercase leading-[0.95] tracking-tighter truncate">
                        VISÃO ESTRATÉGICA & EMBAIXADORAS
                    </h1>
                    
                    <!-- Subtítulo Laranja (Equivalente ao texto menor do cargo do Caiado) -->
                    <p id="sub-title" class="text-[2.2rem] font-extrabold text-brisa-orange uppercase leading-tight tracking-tight truncate mt-1">
                        A trajetória da Unibrisa e o Ecossistema de Aprendizagem
                    </p>

                </div>
            </div>

            <!-- ================= LINHA 3: RODAPÉ PRETO (TICKER) ================= -->
            <div class="flex h-[50px] w-full bg-brisa-black">
                
                <!-- Coluna Esquerda: Label (Equivalente ao PROGRAMAPANICO) -->
                <!-- Mantém os w-[320px] e a mesma borda preta (aqui invisível, mas mantém a grelha) -->
                <div class="w-[320px] bg-brisa-black flex items-center justify-center border-r-[8px] border-brisa-black shrink-0">
                    <!-- Um toque de Laranja no texto para destacar no fundo preto -->
                    <span class="font-black text-[1.2rem] text-brisa-orange tracking-[0.15em] uppercase">PROGRAMA POSITIVAÇÃO</span>
                </div>
                
                <!-- Coluna Centro: Letreiro Animado -->
                <div class="ticker-wrapper bg-brisa-black">
                    <div id="ticker-text" class="ticker-content text-[1.5rem] font-bold uppercase text-white tracking-widest px-4 flex items-center h-full">
                        Participe do nosso sorteio! Poste uma foto assistindo a live com a hashtag #ConectadosPeloAprendizado e concorra a prêmios!
                    </div>
                </div>

                <!-- Coluna Direita: Logo Brisanet (Exatamente como pedido: fundo 2242D4, só a logo) -->
                <div class="w-[280px] bg-brisa-blue flex items-center justify-center shrink-0 z-20">
                    <img src="https://raw.githubusercontent.com/gilneilaurindo/Positiva-o-Unibrisa/main/logo%20brisanet.png" 
                         alt="Brisanet" class="h-[28px] brightness-0 invert object-contain">
                </div>
            </div>

        </div>

        <!-- CONTROLES (Invisíveis) -->
        <div class="click-zone zone-left" onclick="changeMoment(-1)" title="Anterior"></div>
        <div class="click-zone zone-center" onclick="toggleTicker()" title="Pausar/Reproduzir Rodapé"></div>
        <div class="click-zone zone-right" onclick="changeMoment(1)" title="Próximo"></div>
        
    </div>

    <script>
        // Dados puxados da sua programação oficial
        const moments = [
            {
                label: '"BRISACAST - ABERTURA"',
                title: "VISÃO ESTRATÉGICA E EMBAIXADORAS",
                sub: "Valcerlan Almeida, Flávia Paulino e Diretoria",
                ticker: "Participe do nosso sorteio! Poste uma foto assistindo a live com a hashtag #ConectadosPeloAprendizado • Sejam bem-vindos à Positivação Unibrisa 2026!"
            },
            {
                label: '"PAINEL 01 | CIBERSEGURANÇA"',
                title: "CIBERSEGURANÇA NO GRUPO",
                sub: "Proteção de dados e infraestrutura tecnológica",
                ticker: "Fique atento às dicas de segurança digital! • Anote as orientações para o Quiz de hoje • Use a hashtag #ConectadosPeloAprendizado"
            },
            {
                label: '"PAINEL 02 | COMPLIANCE"',
                title: "COMPLIANCE + CÓDIGO DE ÉTICA",
                sub: "Lançamento Oficial do Código de Ética de Bolso",
                ticker: "Conheça as novas diretrizes de Compliance da Brisanet! • Pausa para o almoço das 12:00 às 13:30. Voltaremos com Google Cloud!"
            },
            {
                label: '"PAINEL 03 | GOOGLE CLOUD"',
                title: "PRODUTIVIDADE COM GEMINI",
                sub: "Google Cloud e Workspace no dia a dia da Brisanet",
                ticker: "Descubra como a IA pode acelerar sua rotina! 💡 • Confira os Cursos Plus Brisa na plataforma • Fique ligado nos quizzes para pontuar!"
            },
            {
                label: '"PAINEL 04 | FINANÇAS"',
                title: "EDUCAÇÃO FINANCEIRA",
                sub: "Planejamento e inteligência financeira para colaboradores",
                ticker: "Dicas essenciais para organizar sua vida financeira! • Logo mais, às 16:30, teremos os Resultados dos Quizzes do dia."
            },
            {
                label: '"RESULTADOS OFICIAIS"',
                title: "RESULTADOS DOS QUIZZES",
                sub: "Top 5 Aprendentes e Anúncio da Regional Destaque",
                ticker: "Parabéns a todos os participantes! 🎉 • As áreas com 100% de conclusão do curso de cibersegurança foram reconhecidas! • Continue sua jornada."
            }
        ];

        let currentIndex = 0;
        let isTickerRunning = true;

        function updateUI() {
            const m = moments[currentIndex];
            const gc = document.getElementById('gc-content');
            const ticker = document.getElementById('ticker-text');
            
            // Reiniciar animação do painel principal
            gc.style.animation = 'none';
            void gc.offsetWidth; 
            gc.style.animation = null;
            
            // Atualizar textos
            document.getElementById('moment-label').innerText = m.label;
            document.getElementById('main-title').innerText = m.title;
            document.getElementById('sub-title').innerText = m.sub;
            
            // Repetir o texto para o loop do ticker ficar fluído
            ticker.innerText = m.ticker + "          •          " + m.ticker + "          •          " + m.ticker;
            
            // Garantir que o ticker volta a rodar ao mudar de slide
            ticker.classList.remove('paused');
            ticker.style.animation = 'none';
            void ticker.offsetWidth;
            ticker.style.animation = null;
            isTickerRunning = true;
        }

        function toggleTicker() {
            const ticker = document.getElementById('ticker-text');
            if (isTickerRunning) {
                ticker.classList.add('paused');
            } else {
                ticker.classList.remove('paused');
            }
            isTickerRunning = !isTickerRunning;
        }

        function changeMoment(dir) {
            currentIndex = (currentIndex + dir + moments.length) % moments.length;
            updateUI();
        }

        // Navegação por teclado
        window.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") changeMoment(1);
            if (e.key === "ArrowLeft") changeMoment(-1);
            if (e.key === " ") { 
                e.preventDefault(); 
                toggleTicker(); 
            }
        });

        // Inicializar
        updateUI();
    </script>
</body>
</html>
