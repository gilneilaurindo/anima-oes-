<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GC Animado - Layout Estratégico Convenção 2026</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Figtree -->
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brisa: {
                            orange: '#FF5022', 
                            blue: '#FF5022',   
                            dark: '#000000'
                        }
                    },
                    fontFamily: {
                        sans: ['Figtree', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #00FF00; /* Chroma Key */
            font-family: 'Figtree', sans-serif;
            color: black;
        }

        .viewport-16-9 {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background-color: #00FF00;
            transform-origin: top left;
        }

        /* Animação do Ticker */
        @keyframes tickerScroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            animation: tickerScroll 25s linear infinite;
        }

        /* Animações de entrada */
        .anim-slide-up {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Sombra do GC */
        .gc-shadow {
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="viewport-16-9" id="main-container">
        
        <!-- ESTRUTURA DO GC QUADRADO -->
        <div id="gc-main" class="absolute bottom-16 left-20 w-[1450px] anim-slide-up">
            
            <div class="flex h-[340px] gc-shadow overflow-hidden">
                
                <!-- COLUNA ESQUERDA (BRANDING & PROGRESSO) -->
                <div class="w-[360px] bg-brisa-orange flex flex-col justify-between items-center py-8 text-white border-r-4 border-black/10">
                    <div class="flex flex-col items-center">
                        <div class="text-2xl font-black uppercase tracking-[0.25em] opacity-80">AO VIVO</div>
                        <!-- CONTADOR DE PAINÉIS -->
                        <div id="panel-counter" class="mt-2 bg-black/20 px-4 py-1 rounded-full text-xl font-bold border border-white/20">
                            01 | 10
                        </div>
                    </div>
                    
                    <div class="px-6 w-full flex justify-center">
                        <img src="https://raw.githubusercontent.com/gilneilaurindo/Conven-odeL-deres2026/main/logo%20conven%C3%A7%C3%A3o%20de%20lideres.png" 
                             alt="Convenção de Líderes 2026" class="w-full max-h-[160px] object-contain brightness-0 invert">
                    </div>

                    <div class="text-2xl font-black uppercase tracking-widest opacity-80">CONVENÇÃO</div>
                </div>

                <!-- COLUNA DIREITA (CONTEÚDO ESTRATÉGICO BRANCO) -->
                <div class="flex-1 bg-white flex flex-col px-12 py-8 justify-center border-r-8 border-brisa-orange">
                    <!-- TAG SUPERIOR / TEMA -->
                    <div id="moment-label" class="text-brisa-orange text-2xl font-black uppercase tracking-widest mb-4 border-b-2 border-gray-100 pb-3 flex items-center gap-3">
                        <i class="fa-solid fa-compass"></i> <span>DIREÇÃO ESTRATÉGICA</span>
                    </div>
                    
                    <!-- TÍTULO PRINCIPAL -->
                    <h1 id="main-title" class="text-brisa-orange text-[58px] font-black uppercase leading-[1] tracking-tighter mb-5 drop-shadow-sm">
                        ESTRATÉGIA CLARA, EXECUÇÃO FALHA
                    </h1>
                    
                    <!-- SUBTÍTULO -->
                    <p id="sub-title" class="text-brisa-blue text-4xl font-extrabold uppercase tracking-tight leading-none italic opacity-90">
                        O GAP ESTÁ NA EXECUÇÃO DESALINHADA
                    </p>
                </div>
            </div>

            <!-- BARRA DO TICKER (INFERIOR) -->
            <div class="h-20 bg-black flex items-center overflow-hidden border-t-4 border-brisa-orange">
                <div class="bg-brisa-orange h-full px-8 flex items-center z-10 font-black italic text-white text-2xl border-r border-white/20">
                    INSIGHT
                </div>
                <div class="flex-1 overflow-hidden relative h-full flex items-center">
                    <div id="ticker-text" class="ticker-content text-[26px] font-bold uppercase tracking-wide text-white">
                        “O problema não está nas áreas. Está ENTRE as áreas.” • Menos defesa, mais construção. • O futuro depende da execução — juntos.
                    </div>
                </div>
                
                <!-- LOGO BRISANET NO TICKER -->
                <div class="bg-white h-full px-12 flex items-center">
                    <img src="https://raw.githubusercontent.com/gilneilaurindo/Positiva-o-Unibrisa/main/logo%20brisanet.png" 
                         alt="Brisanet" class="h-8 object-contain">
                </div>
            </div>
        </div>

        <!-- CONTROLES INVISÍVEIS PARA O OPERADOR -->
        <div class="absolute inset-0 z-50 flex pointer-events-none">
            <div onclick="changeMoment(-1)" class="w-1/2 h-full pointer-events-auto cursor-pointer" title="Anterior"></div>
            <div onclick="changeMoment(1)" class="w-1/2 h-full pointer-events-auto cursor-pointer" title="Próximo"></div>
        </div>
    </div>

    <script>
        const moments = [
            {
                label: "CONVENÇÃO DE LÍDERES 2026",
                title: "ESTRATÉGIA CLARA, EXECUÇÃO FALHA",
                sub: "DA ESTRATÉGIA À EXECUÇÃO COMPARTILHADA",
                ticker: "O problema NÃO é estratégia — é execução. • A direção nunca mudou, o gap está no alinhamento. • O futuro depende de fazermos juntos."
            },
            {
                label: "FACILITAÇÃO ESTRATÉGICA",
                title: "TRANSFORMAÇÃO ORGANIZACIONAL",
                sub: "SUELLEN IRACI & KELLY RODRIGUES",
                ticker: "Especialistas em desenvolvimento de lideranças e equipes. • Foco em clareza de contexto e visão do cliente."
            },
            {
                label: "ALERTA CRÍTICO: SITUAÇÃO ATUAL",
                title: "META: 100K | REALIDADE: 30K",
                sub: "O MAIOR RISCO DA COMPANHIA",
                ticker: "O plano não está em linha com a execução. • Resultado atual é cerca de 1/4 do esperado. • Precisamos de alinhamento urgente."
            },
            {
                label: "OBJETIVO: CRESCIMENTO",
                title: "CRESCER NÃO É OPCIONAL",
                sub: "OBRIGAÇÃO E SOBREVIVÊNCIA DO MODELO",
                ticker: "Compromisso regulatório até 2030. • Churn não é problema isolado, é consequência de jornada ruim. • Responsabilidade de todos."
            },
            {
                label: "DIRECIONAMENTO: QUALIDADE",
                title: "CRESCIMENTO COM QUALIDADE",
                sub: "PORTABILIDADE, COMBO 5G E BASE ATUAL",
                ticker: "Definir o que será priorizado e o que será DESPRIORIZADO. • Fazer trade-offs entre áreas pensando no todo."
            },
            {
                label: "PILARES ESTRATÉGICOS",
                title: "CULTURA DE ALTA PERFORMANCE",
                sub: "REESTRUTURAÇÃO E EFICIÊNCIA",
                ticker: "Revisão de indicadores e criação de novos canais. • Estratégia precisa descer para toda a operação."
            },
            {
                label: "FOCO: PESSOAS E CULTURA",
                title: "CAPACITAÇÃO DE LIDERANÇAS",
                sub: "CONTRATAÇÃO QUALIFICADA E CULTURA FORTE",
                ticker: "A cultura atual não sustenta o crescimento necessário. • Aumentar receita com corporativo estruturado."
            },
            {
                label: "TECNOLOGIA E PROCESSO",
                title: "ECOSSISTEMA DE APOIO",
                sub: "INTEGRAÇÃO, IA E EXPERIÊNCIA",
                ticker: "Apps unificados e redução de processos manuais. • Uso de IA para melhor experiência do cliente."
            },
            {
                label: "O PONTO MAIS ESTRATÉGICO",
                title: "O PROBLEMA ESTÁ 'ENTRE' AS ÁREAS",
                sub: "QUEBRAR SILOS E DECISÕES ISOLADAS",
                ticker: "Eliminar a falta de colaboração e a baixa autonomia. • Accountability: franqueza com responsabilidade."
            },
            {
                label: "MENSAGEM FINAL",
                title: "NÃO TEMOS TEMPO: FAÇA HOJE",
                sub: "O QUE JÁ PODE SER FEITO AMANHÃ?",
                ticker: "Melhoria contínua e senso de urgência. • O problema não é o plano, é fazer o plano acontecer. • JUNTOS."
            }
        ];

        let currentIndex = 0;

        function updateUI() {
            const m = moments[currentIndex];
            const gc = document.getElementById('gc-main');
            
            gc.style.animation = 'none';
            void gc.offsetWidth; 
            gc.style.animation = null;
            
            // Atualiza numeração
            const currentNum = (currentIndex + 1).toString().padStart(2, '0');
            const totalNum = moments.length.toString().padStart(2, '0');
            document.getElementById('panel-counter').innerText = `${currentNum} | ${totalNum}`;

            document.getElementById('moment-label').querySelector('span').innerText = m.label;
            document.getElementById('main-title').innerText = m.title;
            document.getElementById('sub-title').innerText = m.sub;
            document.getElementById('ticker-text').innerText = m.ticker + " • " + m.ticker; 
        }

        function changeMoment(dir) {
            currentIndex += dir;
            if (currentIndex >= moments.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = moments.length - 1;
            updateUI();
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight" || e.key === " ") changeMoment(1);
            if (e.key === "ArrowLeft") changeMoment(-1);
        });

        function scaleToFit() {
            const viewport = document.getElementById('main-container');
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            const left = (window.innerWidth - (1920 * scale)) / 2;
            const top = (window.innerHeight - (1080 * scale)) / 2;
            viewport.style.transform = `scale(${scale})`;
            viewport.style.left = `${left}px`;
            viewport.style.top = `${top}px`;
        }

        window.addEventListener('resize', scaleToFit);
        scaleToFit(); 
        updateUI();
    </script>
</body>
</html>
