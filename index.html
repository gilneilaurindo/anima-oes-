    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Figtree -->
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brisa: {
                            orange: '#FF5022', /* Atualizado conforme seu pedido */
                            blue: '#FF5022',   /* Atualizado conforme seu pedido */
                            dark: '#000000'
                        }
                    },
                    fontFamily: {
                        sans: ['Figtree', 'sans-serif']
                    }
                }
            }

    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #00FF00; /* Chroma Key */
            font-family: 'Figtree', sans-serif;
            color: black;
        }

        .viewport-16-9 {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background-color: #00FF00;
            transform-origin: top left;
        }

        /* Animação do Ticker */
        @keyframes tickerScroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            animation: tickerScroll 30s linear infinite;
        }

        /* Animações de entrada */
        .anim-slide-up {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Sombra do GC */
        .gc-shadow {
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div class="viewport-16-9" id="main-container">
        
        <!-- ESTRUTURA DO GC QUADRADO -->
        <div id="gc-main" class="absolute bottom-16 left-20 w-[1400px] anim-slide-up">

                </div>

                <!-- COLUNA DIREITA (CONTEÚDO BRANCO) -->

                    <!-- TAG SUPERIOR -->

                        08:00 - 08:30 | DIA 1
                    </div>
                    
                    <!-- TÍTULO PRINCIPAL -->

                        RECEPÇÃO: CARTÃO DE EMBARQUE

                    <!-- SUBTÍTULO / PARTICIPANTES -->

                        Boas-vindas e integração da nossa tripulação
                    </p>
                </div>
            </div>

            <!-- BARRA DO TICKER (INFERIOR) -->
            <div class="h-20 bg-black flex items-center overflow-hidden border-t-2 border-white/10">
                <div class="flex-1 overflow-hidden relative h-full flex items-center">
                    <div id="ticker-text" class="ticker-content text-2xl font-bold uppercase tracking-wide text-white">
                        Bem-vindos à Convenção de Líderes 2026! • Prepare-se para uma jornada incrível
                    </div>
                </div>
                
                <!-- LOGO BRISANET NO TICKER -->

                         alt="Brisanet" class="h-8 object-contain brightness-0 invert">
                </div>
            </div>
        </div>

        <!-- CONTROLES INVISÍVEIS PARA O OPERADOR -->
        <div class="absolute inset-0 z-50 flex pointer-events-none">
            <div onclick="changeMoment(-1)" class="w-1/2 h-full pointer-events-auto cursor-pointer" title="Anterior"></div>
            <div onclick="changeMoment(1)" class="w-1/2 h-full pointer-events-auto cursor-pointer" title="Próximo"></div>
        </div>
    </div>

        let currentIndex = 0;

        function updateUI() {
            const m = moments[currentIndex];
            const gc = document.getElementById('gc-main');
            
            // Reinicia animação
            gc.style.animation = 'none';
            void gc.offsetWidth; 
            gc.style.animation = null;
            
            document.getElementById('moment-label').innerText = m.label;
            document.getElementById('main-title').innerText = m.title;
            document.getElementById('sub-title').innerText = m.sub;
            document.getElementById('ticker-text').innerText = m.ticker + " • " + m.ticker; 
        }

        function changeMoment(dir) {
            currentIndex += dir;
            if (currentIndex >= moments.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = moments.length - 1;
            updateUI();
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight" || e.key === " ") changeMoment(1);
            if (e.key === "ArrowLeft") changeMoment(-1);
        });

        function scaleToFit() {
            const viewport = document.getElementById('main-container');
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            const left = (window.innerWidth - (1920 * scale)) / 2;
            const top = (window.innerHeight - (1080 * scale)) / 2;
            viewport.style.transform = `scale(${scale})`;
            viewport.style.left = `${left}px`;
            viewport.style.top = `${top}px`;
        }

        window.addEventListener('resize', scaleToFit);
        scaleToFit(); 
        updateUI();
