<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GC Animado V3 - BrisaCast 2026 (Estilo Assertivo)</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brisa: {
                            orange: '#FF7E05',
                            blue: '#2242D4',
                            dark: '#0f172a' // Cor escura para o rodapé estilo Pânico
                        }
                    },
                    fontFamily: {
                        sans: ['Figtree', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            /* Fundo verde para Chroma Key */
            background-color: #00FF00; 
            font-family: 'Figtree', sans-serif;
        }

        /* Contentor 16:9 */
        .viewport-16-9 {
            position: relative;
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.77vh;
            margin: auto;
            overflow: hidden;
        }

        /* Ticker (Rodapé) */
        .ticker-wrapper {
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            height: 100%;
        }

        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            animation: tickerScroll 40s linear infinite;
            will-change: transform;
        }

        @keyframes tickerScroll {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        .paused { animation-play-state: paused; }

        /* Animações de entrada */
        .anim-slide-in {
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-60px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Zonas de clique para navegação invisível */
        .click-zone { position: absolute; top: 0; height: 100%; z-index: 50; cursor: pointer; }
        .zone-left { left: 0; width: 25%; }
        .zone-center { left: 25%; width: 50%; }
        .zone-right { right: 0; width: 25%; }
    </style>
</head>
<body>

    <div class="viewport-16-9" id="main-container">
        
        <div id="gc-content" class="absolute bottom-[50px] left-[5%] w-[90%] max-w-[1400px] flex flex-col items-start">
            
            <div class="flex items-stretch anim-slide-in" style="animation-delay: 0.1s;">
                <div class="bg-brisa-orange text-white font-black text-2xl px-5 py-1.5 flex items-center justify-center tracking-wide uppercase">
                    AO VIVO
                </div>
                <div id="moment-label" class="bg-brisa-blue text-white font-bold text-2xl px-6 py-1.5 flex items-center justify-center tracking-wide uppercase">
                    BRISACAST
                </div>
            </div>

            <div class="flex w-full bg-white shadow-2xl anim-slide-in" style="animation-delay: 0.2s;">
                
                <div class="py-3 px-6 border-r-[8px] border-brisa-orange flex flex-col justify-center items-center gap-3 min-w-[200px] bg-white">
                    <img src="https://raw.githubusercontent.com/gilneilaurindo/Positiva-o-Unibrisa/main/logo%20brisanet.png" 
                         alt="Brisanet" class="h-6 object-contain">
                    <img src="https://raw.githubusercontent.com/gilneilaurindo/Positiva-o-Unibrisa/main/logo%20Unibrisa.png" 
                         alt="Unibrisa" class="h-7 object-contain">
                </div>

                <div class="flex-1 py-4 px-6 flex flex-col justify-center overflow-hidden">
                    <h1 id="main-title" class="text-[3.5rem] font-black uppercase text-brisa-blue leading-none tracking-tighter truncate">
                        ABERTURA & VISÃO ESTRATÉGICA
                    </h1>
                    <p id="sub-title" class="text-2xl font-bold text-brisa-blue mt-1 uppercase tracking-tight truncate">
                        A trajetória da Unibrisa e o Ecossistema de Aprendizagem
                    </p>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 w-full h-[50px] bg-black border-t-4 border-brisa-dark flex items-center">
            <div class="bg-brisa-orange h-full px-6 flex items-center z-10 font-black text-xl text-white tracking-widest uppercase">
                INFO
            </div>
            <div class="ticker-wrapper">
                <div id="ticker-text" class="ticker-content text-xl font-bold uppercase text-white pr-20 tracking-wide">
                    Participe do nosso sorteio! Poste uma foto assistindo a live com a hashtag #ConectadosPeloAprendizado e concorra a prêmios!
                </div>
            </div>
        </div>

        <div class="click-zone zone-left" onclick="changeMoment(-1)" title="Anterior"></div>
        <div class="click-zone zone-center" onclick="toggleTicker()" title="Pausar/Reproduzir Rodapé"></div>
        <div class="click-zone zone-right" onclick="changeMoment(1)" title="Próximo"></div>
        
    </div>

    <script>
        // Dados dos painéis (Intocados)
        const moments = [
            {
                label: "AO VIVO | BRISACAST",
                title: "ABERTURA & VISÃO ESTRATÉGICA",
                sub: "A trajetória da Unibrisa e o Ecossistema de Aprendizagem",
                ticker: "Participe do nosso sorteio! Poste uma foto assistindo a live com a hashtag #ConectadosPeloAprendizado e concorra a prêmios! • Sejam bem-vindos à Positivação Unibrisa 2026!"
            },
            {
                label: "PAINEL 01 | CIBERSEGURANÇA",
                title: "CIBERSEGURANÇA NO GRUPO BRISANET",
                sub: "Valcerlan Almeida, Flavia Paulino, Lucas Kennedy e William Heller",
                ticker: "Fique atento às dicas de segurança digital! • Próximo painel às 10h30: Compliance e Código de Ética • Use a hashtag #ConectadosPeloAprendizado"
            },
            {
                label: "PAINEL 03 | GOOGLE CLOUD",
                title: "PRODUTIVIDADE COM GEMINI E WORKSPACE",
                sub: "Convidados: Natan Valenciano e Igor Carolino",
                ticker: "Descubra como a IA pode acelerar sua rotina! 💡 • Confira os Cursos Plus Brisa na plataforma • Fique ligado nos quizzes para pontuar!"
            },
            {
                label: "MARATONA DO CONHECIMENTO",
                title: "ACELERE A SUA CARREIRA!",
                sub: "5 dias de imersão na plataforma Unibrisa",
                ticker: "Realize os cursos, garanta a melhor pontuação nos Quizzes e suba no Ranking Público! 🏆 • As áreas com 100% de conclusão serão reconhecidas!"
            },
            {
                label: "RESULTADOS OFICIAIS",
                title: "TOP 5 APRENDENTES E DESTAQUES",
                sub: "Conheça a Regional Destaque de hoje!",
                ticker: "Parabéns a todos os participantes! 🎉 • Continue a sua jornada no Universo Brisa • Vemo-nos amanhã para mais conhecimento!"
            }
        ];

        let currentIndex = 0;
        let isTickerRunning = true;

        function updateUI() {
            const m = moments[currentIndex];
            const gc = document.getElementById('gc-content');
            const ticker = document.getElementById('ticker-text');
            
            // Reiniciar animação do painel principal
            gc.style.animation = 'none';
            void gc.offsetWidth; 
            gc.style.animation = null;
            
            // Ajustar o texto
            document.getElementById('moment-label').innerText = m.label;
            document.getElementById('main-title').innerText = m.title;
            document.getElementById('sub-title').innerText = m.sub;
            
            // Repetir o texto para o loop do ticker
            ticker.innerText = m.ticker + "          •          " + m.ticker;
            
            // Garantir que o ticker volta a rodar ao mudar de slide
            ticker.classList.remove('paused');
            ticker.style.animation = 'none';
            void ticker.offsetWidth;
            ticker.style.animation = null;
            isTickerRunning = true;
        }

        function toggleTicker() {
            const ticker = document.getElementById('ticker-text');
            if (isTickerRunning) {
                ticker.classList.add('paused');
            } else {
                ticker.classList.remove('paused');
            }
            isTickerRunning = !isTickerRunning;
        }

        function changeMoment(dir) {
            currentIndex = (currentIndex + dir + moments.length) % moments.length;
            updateUI();
        }

        // Navegação por teclado
        window.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") changeMoment(1);
            if (e.key === "ArrowLeft") changeMoment(-1);
            if (e.key === " ") { 
                e.preventDefault(); 
                toggleTicker(); 
            }
        });

        // Inicializar
        updateUI();
    </script>
</body>
</html>
